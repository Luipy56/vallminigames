<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minijuegos: Puzzle Fotos y Memori. Vall Mini Games por LdeLuipy.">
  <link rel="canonical" href="https://vmg.ldeluipy.es/">
  <title>Vall Mini Games</title>
  <style>
    :root {
      --vmg-bg: #1a1a2e;
      --vmg-surface: #16213e;
      --vmg-surface-hover: #0f3460;
      --vmg-text: #eee;
      --vmg-text-bright: #fff;
      --vmg-muted: #666;
      --vmg-border: #0f3460;
      --vmg-radius: 12px;
      --vmg-font: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--vmg-font);
      background: var(--vmg-bg);
      color: var(--vmg-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--vmg-text-bright);
    }
    .games {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .games a {
      display: block;
      padding: 1.25rem 2rem;
      background: var(--vmg-surface);
      color: var(--vmg-text-bright);
      text-decoration: none;
      border-radius: var(--vmg-radius);
      font-weight: 500;
      border: 1px solid var(--vmg-border);
      transition: background 0.2s, transform 0.15s;
    }
    .games a:hover {
      background: var(--vmg-surface-hover);
      transform: translateY(-2px);
    }
    .games a.disabled {
      opacity: 0.6;
      pointer-events: none;
      color: #888;
    }
    .watermark {
      position: relative;
      margin-top: auto;
      padding: 0.4rem;
      font-size: 0.7rem;
      color: var(--vmg-muted);
      text-align: center;
    }
    .watermark a {
      color: inherit;
      text-decoration: none;
    }
    .watermark a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Vall Mini Games</h1>
  <nav class="games" aria-label="Elige un juego">
    <a href="puzzle-fotos/">1. Puzzle Fotos</a>
    <a href="memori/">2. Memori</a>
  </nav>
  <footer class="watermark"><a href="https://ldeluipy.es" target="_blank" rel="noopener noreferrer">ldeluipy</a></footer>
</body>
</html>
